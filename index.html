<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DUS Çalışma">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text y='70' font-size='60' fill='%23fff' text-anchor='middle' x='50'>🦷</text></svg>">
    <title>DUS Çalışma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Home Screen Styles */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .home-title {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
        }

        .subject-btn {
            width: 280px;
            padding: 20px 40px;
            margin: 10px;
            font-size: 22px;
            border: 2px solid #fff;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subject-btn:hover,
        .subject-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .subject-btn.patoloji {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .subject-btn.fizyoloji {
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        .subject-btn.mikrobiyoloji {
            border-color: #a855f7;
            color: #a855f7;
        }

        .subject-btn.biyokimya {
            border-color: #ab0505;
            color: #ab0505;
        }

        .subject-btn.genetik {
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .subject-btn.periodontoloji {
            border-color: #f97316;
            color: #f97316;
        }

        /* Quiz Screen Styles */
        .quiz-screen {
            display: none;
            height: 100vh;
        }

        .container {
            padding: 20px;
            padding-bottom: 100px;
            height: 100%;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            color: #888;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .content {
            font-size: 38px;
            line-height: 1.4;
            text-align: center;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }

        .test-btn {
            position: fixed;
            top: 20px;
            left: 80px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }

        .test-btn.active {
            background: #0066ff;
            border-color: #0066ff;
        }

        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 20px;
            color: #888;
            z-index: 100;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            padding: 10px;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            color: #fff;
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn.jump-btn {
            font-size: 16px;
            flex: 1.4;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .hidden-answer {
            filter: blur(15px);
            user-select: none;
        }

        .reveal-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: #0066ff;
            border: none;
            color: #fff;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
        }

        .reveal-btn:active {
            background: #0055dd;
            transform: scale(0.95);
        }

        .table-container {
            margin: 20px 0;
            overflow-x: auto;
        }

        .custom-table {
            border-collapse: collapse;
            margin: 20px auto;
            text-align: left;
            font-size: 18px;
        }

        .custom-table th,
        .custom-table td {
            border: 2px solid #444;
            padding: 12px;
        }

        .custom-table th {
            background: #1a1a1a;
            color: #0066ff;
        }

        .custom-table td {
            background: #0a0a0a;
        }

        .subject-indicator {
            position: fixed;
            top: 60px;
            left: 20px;
            font-size: 12px;
            color: #666;
            z-index: 100;
        }

        @media (min-width: 768px) {
            .content {
                font-size: 48px;
            }

            .custom-table {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <!-- Home Screen -->
    <div class="home-screen" id="homeScreen">
        <h1 class="home-title">🦷 DUS Çalışma</h1>
        <button class="subject-btn patoloji" onclick="startQuiz('patoloji')">🔬 Patoloji</button>
        <button class="subject-btn fizyoloji" onclick="startQuiz('fizyoloji')">🧬 Fizyoloji</button>
        <button class="subject-btn mikrobiyoloji" onclick="startQuiz('mikrobiyoloji')">🦠 Mikrobiyoloji</button>
        <button class="subject-btn biyokimya" onclick="startQuiz('biyokimya')">🧪 Biyokimya</button>
        <button class="subject-btn genetik" onclick="startQuiz('genetik')">🧬 Genetik</button>
        <button class="subject-btn periodontoloji" onclick="startQuiz('periodontoloji')">🦷 Periodontoloji</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen" id="quizScreen">
        <button class="back-btn" onclick="goHome()">←</button>
        <button class="test-btn" id="testBtn" onclick="toggleTest()">🧠 Test: OFF</button>
        <div class="timer" id="timer">7</div>
        <div class="subject-indicator" id="subjectIndicator"></div>

        <div class="container">
            <div class="header" id="header">Slayt 1 / 149</div>
            <div class="content" id="content"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prev()">←</button>
            <button class="btn" id="playBtn" onclick="togglePlay()">⏸</button>
            <button class="btn" onclick="next()">→</button>
            <button class="btn jump-btn" onclick="goToQuestion()">No'ya Git</button>
        </div>
    </div>

    <script>

<div class="table-container">

• Büyüme faktörlerinin kanda azalması

<tr><td><b>Yeni sentezlenenler:</b><br>• Lipid mediyatörler (AA metabolitleri ve PAF)<br>• Sitokinler<br>• Reaktif oksijen radikalleri<br>• Nitrik oksit<br>• Nöropeptitler</td><td></td></tr>

            `310. Profilaksi ihtiyacı duyulan hastalarda önerilen ilaç rejimleri:

<tr><td>Oral ilaç alamayan</td><td>Cefazolin veya Ceftriaxone</td><td>1 g IM/IV</td><td>50 mg/kg IM/IV</td></tr>
<tr><td>Amoksisilin/Penisilin alerjisi (oral)</td><td>Cephalexin</td><td>2 g</td><td>50 mg/kg</td></tr>
<tr><td>Amoksisilin/Penisilin alerjisi (oral)</td><td>Azithromycin veya Clarithromycin</td><td>500 mg</td><td>15 mg/kg</td></tr>
<tr><td>Amoksisilin/Penisilin alerjisi (oral)</td><td>Doxycycline</td><td>100 mg</td><td>&lt;45 kg: 2.2 mg/kg<br>&gt;45 kg: 100 mg</td></tr>
<tr><td>Oral ilaç alamayan + Penisilin alerjisi</td><td>Cefazolin veya Ceftriaxone</td><td>1 g IM/IV</td><td>50 mg/kg IM/IV</td></tr>

            "311. Diyabetik hastalarda glisemik kontrol seviyesinin belirlenmesi için kullanılabilecek testler… Glikozile hemoglobin testleri (HbA1 ve HbA1c)",
            "312. Cerrahi tedavilerden önce HbA1c seviyesi hangi düzeye gelmelidir… %10‛dan düşük",
            "313. İyi kontrollü diyabette HbA1c düzeyi… <7"
        ];

        let currentSubject = '';
        let slides = [];
        let current = 0;
        let playing = true;
        let timeLeft = 7;
        let testMode = false;
        let revealed = false;
        let timer;

        function startQuiz(subject) {
            currentSubject = subject;

            if (subject === 'patoloji') {
                slides = patolojiSlides;
            } else if (subject === 'fizyoloji') {
                slides = fizyolojiSlides;
            } else if (subject === 'mikrobiyoloji') {
                slides = mikrobiyolojiSlides;
            } else if (subject === 'biyokimya') {
                slides = biyokimyaSlides;
            } else if (subject === 'genetik') {
                slides = genetikSlides;
            } else if (subject === 'periodontoloji') {
                slides = periodontolojiSlides;
            } else {
                slides = patolojiSlides; // Güvenli fallback
                currentSubject = 'patoloji';
            }

            current = 0;
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';

            // Ders bazlı gösterge metnini tek yerde belirliyoruz.
            const subjectLabels = {
                patoloji: '🔬 Patoloji',
                fizyoloji: '🧬 Fizyoloji',
                mikrobiyoloji: '🦠 Mikrobiyoloji',
                biyokimya: '🧪 Biyokimya',
                genetik: '🧬 Genetik',
                periodontoloji: '🦷 Periodontoloji'
            };
            document.getElementById('subjectIndicator').textContent =
                subjectLabels[currentSubject] || '🔬 Patoloji';

            show(0);
        }

        function goHome() {
            stopTimer();
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'flex';
            testMode = false;
            document.getElementById('testBtn').textContent = '🧠 Test: OFF';
            document.getElementById('testBtn').classList.remove('active');
            playing = true;
            document.getElementById('playBtn').textContent = '⏸';
        }

        function show(i) {
            if (i < 0 || i >= slides.length) return;

            let content = slides[i];
            revealed = false;

            // Test mode: hide answer after … symbol
            if (testMode && content.includes('…')) {
                const parts = content.split('…');
                if (parts.length >= 2) {
                    content = parts[0] + '…<br><br><div class="hidden-answer">' +
                        parts.slice(1).join('…') + '</div>' +
                        '<br><button class="reveal-btn" onclick="reveal()">Cevabı Göster 👁️</button>';
                }
            }

            document.getElementById('content').innerHTML = content;
            document.getElementById('header').textContent = `Slayt ${i + 1} / ${slides.length}`;

            resetTimer();
        }

        function reveal() {
            const hidden = document.querySelector('.hidden-answer');
            const btn = document.querySelector('.reveal-btn');
            if (hidden) hidden.classList.remove('hidden-answer');
            if (btn) btn.remove();
            revealed = true;
        }

        function next() {
            current = (current + 1) % slides.length;
            show(current);
        }

        function prev() {
            current = (current - 1 + slides.length) % slides.length;
            show(current);
        }

        function togglePlay() {
            playing = !playing;
            document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
            if (playing) resetTimer();
            else stopTimer();
        }

        function toggleTest() {
            testMode = !testMode;
            const btn = document.getElementById('testBtn');
            btn.textContent = testMode ? '🧠 Test: ON' : '🧠 Test: OFF';
            btn.classList.toggle('active');
            show(current);
        }

        function goToQuestion() {
            if (!slides.length) return;

            const raw = prompt(
                `Gitmek istediğin soru numarası (1-${slides.length})`,
                String(current + 1)
            );

            if (raw === null) return;

            const value = raw.trim();
            if (!value) return;

            const target = Number(value);
            if (!Number.isInteger(target) || target < 1 || target > slides.length) {
                alert(`Geçerli bir soru numarası gir (1-${slides.length}).`);
                return;
            }

            current = target - 1;
            show(current);
        }

        function startTimer() {
            if (!playing) return;
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                } else {
                    // In test mode, don't auto-advance until answer revealed
                    if (testMode && !revealed) return;
                    next();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timer) clearInterval(timer);
        }

        function resetTimer() {
            stopTimer();
            timeLeft = 7;
            document.getElementById('timer').textContent = '7';
            if (playing) startTimer();
        }

        // Swipe support
        let touchX = 0;
        document.addEventListener('touchstart', e => {
            touchX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', e => {
            const diff = touchX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? next() : prev();
            }
        });

        // Keyboard
        document.addEventListener('keydown', e => {
            if (document.getElementById('homeScreen').style.display !== 'none') return;

            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                next();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prev();
            } else if (e.key === 'p' || e.key === 'P') {
                togglePlay();
            } else if (e.key === 'g' || e.key === 'G') {
                goToQuestion();
            } else if (e.key === 'Escape') {
                goHome();
            }
        });

        // Wake lock
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => { });
        }
    </script>
