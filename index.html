<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DUS Çalışma">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><text y='70' font-size='60' fill='%23fff' text-anchor='middle' x='50'>🦷</text></svg>">
    <title>DUS Çalışma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Home Screen Styles */
        .home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .home-title {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
        }

        .subject-btn {
            width: 280px;
            padding: 20px 40px;
            margin: 10px;
            font-size: 22px;
            border: 2px solid #fff;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .subject-btn:hover,
        .subject-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .subject-btn.patoloji {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .subject-btn.fizyoloji {
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        .subject-btn.mikrobiyoloji {
            border-color: #a855f7;
            color: #a855f7;
        }

        .subject-btn.biyokimya {
            border-color: #ab0505;
            color: #ab0505;
        }

        .subject-btn.genetik {
            border-color: #f59e0b;
            color: #f59e0b;
        }

        .subject-btn.ortodonti {
            border-color: #22c55e;
            color: #22c55e;
        }

        .subject-btn.periodontoloji {
            border-color: #f97316;
            color: #f97316;
        }

        /* Quiz Screen Styles */
        .quiz-screen {
            display: none;
            height: 100vh;
        }

        .container {
            padding: 20px;
            padding-bottom: 100px;
            height: 100%;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            color: #888;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .content {
            font-size: 38px;
            line-height: 1.4;
            text-align: center;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            color: #fff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }

        .test-btn {
            position: fixed;
            top: 20px;
            left: 80px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #444;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }

        .test-btn.active {
            background: #0066ff;
            border-color: #0066ff;
        }

        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 20px;
            color: #888;
            z-index: 100;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            padding: 10px;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            color: #fff;
            padding: 15px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .hidden-answer {
            filter: blur(15px);
            user-select: none;
        }

        .reveal-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: #0066ff;
            border: none;
            color: #fff;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
        }

        .reveal-btn:active {
            background: #0055dd;
            transform: scale(0.95);
        }

        .table-container {
            margin: 20px 0;
            overflow-x: auto;
        }

        .custom-table {
            border-collapse: collapse;
            margin: 20px auto;
            text-align: left;
            font-size: 18px;
        }

        .custom-table th,
        .custom-table td {
            border: 2px solid #444;
            padding: 12px;
        }

        .custom-table th {
            background: #1a1a1a;
            color: #0066ff;
        }

        .custom-table td {
            background: #0a0a0a;
        }

        .source-page-block {
            margin-top: 22px;
            text-align: center;
        }

        .source-page-link {
            display: inline-block;
            color: #7ab6ff;
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .source-page-link:hover {
            text-decoration: underline;
        }

        .source-page-image {
            width: 100%;
            max-width: 640px;
            border: 1px solid #444;
            border-radius: 10px;
            background: #111;
        }

        .subject-indicator {
            position: fixed;
            top: 60px;
            left: 20px;
            font-size: 12px;
            color: #666;
            z-index: 100;
        }

        @media (min-width: 768px) {
            .content {
                font-size: 48px;
            }

            .custom-table {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <!-- Home Screen -->
    <div class="home-screen" id="homeScreen">
        <h1 class="home-title">🦷 DUS Çalışma</h1>
        <button class="subject-btn patoloji" onclick="startQuiz('patoloji')">🔬 Patoloji</button>
        <button class="subject-btn fizyoloji" onclick="startQuiz('fizyoloji')">🧬 Fizyoloji</button>
        <button class="subject-btn mikrobiyoloji" onclick="startQuiz('mikrobiyoloji')">🦠 Mikrobiyoloji</button>
        <button class="subject-btn biyokimya" onclick="startQuiz('biyokimya')">🧪 Biyokimya</button>
        <button class="subject-btn genetik" onclick="startQuiz('genetik')">🧬 Genetik</button>
        <button class="subject-btn ortodonti" onclick="startQuiz('ortodonti')">😁 Ortodonti</button>
        <button class="subject-btn periodontoloji" onclick="startQuiz('periodontoloji')">🦷 Periodontoloji</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-screen" id="quizScreen">
        <button class="back-btn" onclick="goHome()">←</button>
        <button class="test-btn" id="testBtn" onclick="toggleTest()">🧠 Test: OFF</button>
        <div class="timer" id="timer">7</div>
        <div class="subject-indicator" id="subjectIndicator"></div>

        <div class="container">
            <div class="header" id="header">Slayt 1 / 149</div>
            <div class="content" id="content"></div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prev()">←</button>
            <button class="btn" id="playBtn" onclick="togglePlay()">⏸</button>
            <button class="btn" onclick="next()">→</button>
        </div>
    </div>

    <script>
        // Patoloji Slides
        const patolojiSlides = [
            "1. Hipoksiden ilk etkilenen organel… Mitokondri",
            "2. Vaskülitlerde görülen nekroz tipi… Fibrinoid nekroz",
            "3. Hücrenin hidrolitik enzimlerle kendi kendini sindirmesi… Otofaji",
            `4. İskemik zedelenmede hücre içinde:

<div class="table-container">
<table class="custom-table">
<tr><th>Azalanlar</th><th>Artanlar</th></tr>
<tr><td>ATP (ilk azalan)</td><td>ADP + İnorganik fosfatlar</td></tr>
<tr><td>Glikojen</td><td>Anaerobik solunum → laktik asit →<br>pH azalır → kromatinde kümelenme</td></tr>
<tr><td>Protein sentezi</td><td>Yağlar hücre dışına atılamaz ve artar</td></tr>
<tr><td>Potasyum</td><td>Sodyum, klor ve su</td></tr>
<tr><td></td><td>Kalsiyum</td></tr>
</table>
</div>`,
            "5. Fizyolojik apoptozisin örnekleri… Menstrüasyonda endometriyal hücrelerin dökülmesi, laktasyon döneminden çıkan meme dokusunun küçülmesi",
            "6. Patolojik apoptoz örneği… Duktus tıkanıklıklarına bağlı olarak parankimal organlarda gelişen patolojik atrofi",
            "7. Otofajinin en sık nedeni… Besin yetersizliği",
            "8. Apoptotik hücrelerdeki yüzey belirteçleri… Fosfotidilserin, Trombospondin, C1q",
            "9. Hücrede irreversibl değişikliklere neden olan enzimleri hangi iyon tetikler… Kalsiyum",
            "10. Serbest oksijen radikallerini oluşturan ana enzim… NADPH oksidaz",
            "11. Doğumdan kısa bir süre sonra meydana gelen uterus boyutundaki azalma… Fizyolojik atrofi",
            "12. Otofajik vakuoller… Atrofide görülür",
            "13. Enzimatik sindimin görüldüğü nekroz… Likefaksiyon nekrozu",
            "14. Akut pankreatitteki nekroz tipi... Yağ nekrozu",
            `15. Nekroz – Apoptoz farkları:

<div class="table-container">
<table class="custom-table">
<tr><th>Nekroz</th><th>Apoptoz</th></tr>
<tr><td>İnflamasyon var</td><td>İnflamasyon yok</td></tr>
<tr><td>Gen yok</td><td>Gen var</td></tr>
<tr><td>Patolojik</td><td>Fizyolojik veya patolojik</td></tr>
<tr><td>Jel elektroforezi kesintisiz patern</td><td>Jel elektroforezi merdiven paterni</td></tr>
</table>
</div>`,
            "16. Apoptozda jel elektroforezinde… Merdiven paterni görülür",
            `17. Nekroz tipleri:

<div class="table-container">
<table class="custom-table">
<tr><th>Nekroz tipi</th><th>Görüldüğü Yer</th><th>Önemli Özellikler</th></tr>
<tr><td>Koagülasyon nekrozu</td><td>Hipokside ve malign tümörler</td><td>Protein denatürasyonu<br>(enzimatik yıkım yok)</td></tr>
<tr><td>Likefaksiyon nekrozu</td><td>Beyin hipoksisi ve apse</td><td>Nötrofil enzimleri ile<br>sindirim var</td></tr>
<tr><td>Kazeifikasyon nekrozu</td><td>Tüberküloz</td><td>Peynir kıvamında</td></tr>
<tr><td>Gangrenöz nekroz</td><td>Diyabetik ayak (hipoksi)</td><td>Ekstremitelerin<br>koagülasyon nekrozu</td></tr>
<tr><td>Yağ nekrozu</td><td>Meme, Pankreatit</td><td>Travmatik, Enzimatik</td></tr>
<tr><td>Fibrinoid nekroz</td><td>Vaskülit, Malign hipertansiyon,<br>Akut romatizmal ateş</td><td>Damar duvarı hasarı,<br>Aschoff cisimleri</td></tr>
</table>
</div>`,
            `18. Apoptozisi regüle eden genler:

<div class="table-container">
<table class="custom-table">
<tr><th>Apoptozisi artıranlar</th><th>Apoptozisi engelleyenler</th></tr>
<tr><td>P53</td><td>Bcl-2</td></tr>
<tr><td>Bax, Bak</td><td>Bcl-XL</td></tr>
<tr><td>Bad, Bid, Bim, Puma, Noxa</td><td>MCL-1</td></tr>
<tr><td>Bcl-XS</td><td>FLIP</td></tr>
</table>
</div>`,
            "19. Kanser riskinde artış görülmeyen metaplazi örnekleri… Apokrin metaplazi ve miyozitis ossifikans",
            "20. Kromatin kümelenmesi ve kabalaşmasının sebebi… pH azalması",
            "21. Apoptozun en karakteristik bulgusu… Kromatin kondenzasyon ve fragmantasyonu",
            `22. Apopitozun intrensek yolunun tetikleyicileri…

• Büyüme faktörlerinin kanda azalması
• Hatalı katlanmış proteinlerin aşırı birikimi
• Kalıcı DNA hasarı`,
            `23. İnflamasyonun kimyasal mediyatörleri:

<div class="table-container">
<table class="custom-table">
<tr><th>Hücre kökenli</th><th>Plazma kökenli</th></tr>
<tr><td><b>Depo halde:</b><br>• Vazoaktif aminler (histamin, serotonin)<br>• Lizozomal enzimler</td><td>• Koagülasyon<br>• Kinin<br>• Kompleman<br>• 3K</td></tr>
<tr><td><b>Yeni sentezlenenler:</b><br>• Lipid mediyatörler (AA metabolitleri ve PAF)<br>• Sitokinler<br>• Reaktif oksijen radikalleri<br>• Nitrik oksit<br>• Nöropeptitler</td><td></td></tr>
</table>
</div>`,
            "24. İleri yaşta serbest radikal hasarı ile oluşan, lipid ve protein kompleksinden oluşan sarı-kahverengi pigment... Lipofuskin",
            `25. Patolojik kalsifikasyonlar:

<div class="table-container">
<table class="custom-table">
<tr><th>Distrofik kalsifikasyon</th><th>Metastatik kalsifikasyon</th></tr>
<tr><td>Serum kalsiyum normal</td><td>Hiperkalsemide</td></tr>
<tr><td>Hasarlı dokularda kalsiyum birikimesi</td><td>Normal dokulara kalsiyum çökmesi</td></tr>
<tr><td><b>Örnek:</b> Psammom cisimcikleri</td><td><b>Örnek:</b> Hiperkalsemi yapan hastalıklar</td></tr>
</table>
</div>`,
            "26. Atrofide uyarılan yolak hangisidir… Ubiquitin-proteozom yolağı",
            "27. Hipertansiyona sekonder gelişen miyokard kalınlaşmasının morfolojik tanımı… Patolojik hipertrofi",
            "28. Metaplazi en sık hangi hücre tipinde oluşur… Epitel",
            "29. En sık epitel metaplazisi hangisidir… Kolumnar epitelin skuamöz epitele dönüşümü",
            "30. Histamin salınımını tetikleyen faktörler… Travma, ısı, IgE'nin Fc parçası, C3a, C5a, IL1, IL8",
            "31. Trombosit agregasyonunu indükleyen araşidonik asit metaboliti... Tromboksan A2",
            "32. Ağır yanıkların erken evrelerindeki vasküler geçirgenlik artışına neden olan mekanizma... Direkt endotel hasarı",
            "33. En önemli kemotaktik maddeler... C5a, IL-8, LT-B4, Bakteri parçalanma ürünleri, Eotaksin, 5-HETE",
            "34. Kronik inflamasyonda doku hasarı tamiri, fibrozis ve anjiyogenezden sorumlu hücre hangisidir... Aktive makrofaj (=Alternatif makrofaj=M2 makrofaj)",
            "35. Yardımcı T hücre 1 (Th1) lenfositler hangisini salgılar… Gamma interferon",
            "36. Difteride hangi tip inflamasyon görülür... Pseudomembranöz inflamasyon",
            "37. Dokularda granülomların oluşmasında rol oynayan en önemli mekanizma nedir... TH1 hücre yanıtı",
            "38. Alternatif makrofajlardan (M2)… TGF-B ve IL-10 salgılanır",
            "39. Mast hücre degranülasyonundan sorumlu anaflatoksinler… C3a, C4a, C5a",
            "40. Anjiyogenezi inhibe eden faktör... Trombospondin",
            "41. AL tipi amiloidozisin en sık nedeni... Multipl miyelom",
            "42. Siklin bağımlı kinaz inhibitörlerinden biri olan p27 (CDKN1B) hücre siklusu kontrol noktalarından G2-M noktasında... Siklin B-CDK1'i inhibe eder",
            "43. Hangi proteinin fosforilasyonu hücre siklusunun ilerlemesinde önemli rol oynar... Retinoblastom proteini",
            `44. p53'ün hücre siklusundaki rolü:

✓ CDK inhibitörü olan p21'i artırarak siklusu durdurur
✓ GADD45 geni ile DNA tamirini sağlar
✓ DNA tamiri sağlanırsa MDM2 geni ile p53 inhibe edilir ve siklus devam eder
✓ DNA tamiri başarısız olursa bax ve puma geniyle apoptozu uyarır`,
            "45. Mukus üretiminden sorumlu inflamatuvar mediyatörler… PgD2, IL-13, Histamin",
            "46. Lipoksinler… Anti-lökotrien etki, anti-inflamatuavrar etki ve vazodilatör etki gösterir",
            "47. Depo halde bulunan inflamatuvar sitokinler… Histamin, serotonin, lizozomal enzimler",
            "48. Bir dokunun veya organın olması gereken yer dışında bulunması... Heterotopi (Koristom)",
            "49. Hem mezenkimal hem de epitelyal malign hücreler içeren tümör... Karsinosarkom",
            "50. Tümör hücrelerinin biçim, büyüklük ve boyanma özellikleri açısından birbirlerinden farklı olmaları... Pleomorfizm",
            "51. Yerleştiği organın matür hücre ve dokularında organizasyon bozukluğu gösteren kitle oluşumu... Hamartom",

            "53. Akut hücresel şişmeden sorumlu iyon… Sodyum",
            "54. Antioksidan maddeler: A,C,E Vitamini, Selenyum, Sistein, Demir bakır taşıyan proteinler",
            "55. Ana yıkıcı kaspazlar... Kaspaz 3 ve kaspaz 6",
            "56. Hücrenin hidrotilik enzimlerle parçalanmasına neden olan iyon… Kalsiyum",
            "57. Granülomlarda gözüken kogülasyon nekrozu… Kazeifikasyon nekrozu",
            "58. Parotiste mikroskobik olarak nonkazeifiye granülomlarla karakterize bir kronik inflamasyonda öncelikle düşünülmesi gereken... Sarkoidoz",

            "61. Atrofide sayısı artan hücre organeli... Lizozomlar",
            "62. Tükürük bezi boşaltım kanallarında uzun süreli taş varlığında, kanal döşeyici epitelinde görülen değişim… Metaplazi",
            "63. Mezenşimal dokularda görülen ve tek geridönüşümsüz metaplazi… Miyozitis ossifikans",
            "64. Granülasyon dokusunda damar geçirgenliğini arttıran molekül... VEGF",
            "65. Histaminin damar geçirgenliğini arttırıcı mekanizması… Endotel kontraksiyonu",
            "66. İnflamasyonda yuvarlanmadan sorumlu endotelyal selektinler… E-selektin, P-selektin, CD34",
            "67. İnflamasyonda lökositlerin adezyonundan sorumlu endotelyal molekül... ICAM-1, WCAM-1",
            "68. Makrofajlardan salındıktan sonra Th1 hüclerini uyararak gama interferon salınımına neden olan sitokin... IL-12-15-18",
            "69. Nötrofilden zengin, püy oluşturan inflamasyon… Süpüratif inflamasyon",
            "70. Dokularda granülomların oluşmasında rol oynayan en önemli mekanizma nedir... TH1 hücre yanıtı",
            "71. Dokularda granülomları oluşturan temel hücre… Epiteloid histiyosit",
            "72. Sekonder yara iyileşmesinde epitelizasyon ne zaman başlar?... En erken 3. gün",
            "73. Skar dokusunun kontrakte olmasını sağlayan hücre hangisidir... Fibroblastların düz kas hücreleri gibi davranması (=Miyofibroblastlar)",
            "74. Azalmış onkotik basınca bağlı oluşan ödem örnekleri nelerdir... Malnütrisyon, nefrotik sendrom, karaciğer yetmezliği, hipoalbüminemi, Menetrier hastalığı",
            "75. Yükselmiş hidrostatik basıncına bağlı oluşan ödem örnekleri nelerdir... Konjestif kalp yetmezliği, bozulmuş venöz dönüş, konstriktif perikardit, asit, venöz obstrüksiyon, arteryel dilatasyon, ısı, nörohümoral disregülasyon",

            "77. GNAS mutasyonu görülen durumlar… McCune Albright sendromu, fibröz displazi",
            `78. Patolojide "Baykuş Gözleri":

• Hodgkin lenfomadaki Reed-Sternberg hücreleri
• CMV enfeksiyonuna bağlı intranükleer-intrasitoplazmik inklüzyonlar akla gelmelidir`,
            "79. Üst ve alt solunum yollarında granülomatöz reaksiyonla karakterize hastalık... Wegener granülomatozu (granülomatöz polianjit)",
            "80. Malign potansiyeli olmayan oral lezyon… Hairy lökoplaki",
            "81. Hairy lökoplakiye neden olan etyolojik ajan… EBV",

        function show(i) {
            if (i < 0 || i >= slides.length) return;

            let content = slides[i];
            revealed = false;

            // Test mode: hide answer after … symbol
            if (testMode && content.includes('…')) {
                const parts = content.split('…');
                if (parts.length >= 2) {
                    content = parts[0] + '…<br><br><div class="hidden-answer">' +
                        parts.slice(1).join('…') + '</div>' +

                }
            }

            // Ortodonti sorularında kaynak PDF sayfasını görsel olarak göster.
            if (currentSubject === 'ortodonti') {
                const pageNumber = ortodontiQuestionPages[i] || 1;
                const fileNumber = String(pageNumber).padStart(2, '0');
                const sourcePath = `assets/ortodonti-pages/page-${fileNumber}.png`;
                content += `
<div class="source-page-block">
    <a class="source-page-link" href="${sourcePath}" target="_blank" rel="noopener noreferrer">

</div>`;

            const hidden = document.querySelector('.hidden-answer');
            const btn = document.querySelector('.reveal-btn');
            if (hidden) hidden.classList.remove('hidden-answer');
            if (btn) btn.remove();
            revealed = true;
        }

        function next() {
            current = (current + 1) % slides.length;
            show(current);
        }

        function prev() {
            current = (current - 1 + slides.length) % slides.length;
            show(current);
        }

        function togglePlay() {
            playing = !playing;
            document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
            if (playing) resetTimer();
            else stopTimer();
        }

        function toggleTest() {
            testMode = !testMode;
            const btn = document.getElementById('testBtn');
            btn.textContent = testMode ? '🧠 Test: ON' : '🧠 Test: OFF';
            btn.classList.toggle('active');
            show(current);
        }

        function startTimer() {
            if (!playing) return;
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').textContent = timeLeft;
                } else {
                    // In test mode, don't auto-advance until answer revealed
                    if (testMode && !revealed) return;
                    next();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timer) clearInterval(timer);
        }

        function resetTimer() {
            stopTimer();
            timeLeft = 7;
            document.getElementById('timer').textContent = '7';
            if (playing) startTimer();
        }

        // Swipe support
        let touchX = 0;
        document.addEventListener('touchstart', e => {
            touchX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', e => {
            const diff = touchX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? next() : prev();
            }
        });

        // Keyboard
        document.addEventListener('keydown', e => {
            if (document.getElementById('homeScreen').style.display !== 'none') return;

            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                next();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prev();
            } else if (e.key === 'p' || e.key === 'P') {
                togglePlay();
            } else if (e.key === 'Escape') {
                goHome();
            }
        });

        // Wake lock
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => { });
        }
